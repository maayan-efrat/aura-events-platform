services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auraevents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auraevents}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-api:
    build:
      context: ./src
      dockerfile: services/Identity.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__IdentityDb: Host=postgres;Port=5432;Database=auraevents_identity;Username=${POSTGRES_USER:-auraevents};Password=${POSTGRES_PASSWORD:?}
      Jwt__Issuer: ${JWT_ISSUER:-https://identity.auraevents.local}
      Jwt__Audience: ${JWT_AUDIENCE:-auraevents-clients}
      Jwt__PublicKeyPath: /keys/jwt-public.pem
      Jwt__PrivateKeyPath: /keys/jwt-private.pem
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
    volumes:
      - ./keys:/keys:ro
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy

  events-api:
    build:
      context: ./src
      dockerfile: services/Events.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__EventsDb: Host=postgres;Port=5432;Database=auraevents_events;Username=${POSTGRES_USER:-auraevents};Password=${POSTGRES_PASSWORD:?}
      Jwt__Issuer: ${JWT_ISSUER:-https://identity.auraevents.local}
      Jwt__Audience: ${JWT_AUDIENCE:-auraevents-clients}
      Jwt__PublicKeyPath: /keys/jwt-public.pem
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
      OpenAI__ApiKey: ${OPENAI_API_KEY:?OPENAI_API_KEY must be set in .env}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - ./keys:/keys:ro
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy

  umbraco:
    build:
      context: ./cms
      dockerfile: AuraEvents.Umbraco/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__umbracoDbDSN: Host=postgres;Port=5432;Database=auraevents_cms;Username=${POSTGRES_USER:-auraevents};Password=${POSTGRES_PASSWORD:?};Include Error Detail=true
      ConnectionStrings__umbracoDbDSN_ProviderName: Npgsql2
      Umbraco__CMS__Unattended__UnattendedUserName: ${UMBRACO_ADMIN_NAME:-AuraEvents Admin}
      Umbraco__CMS__Unattended__UnattendedUserEmail: ${UMBRACO_ADMIN_EMAIL:?UMBRACO_ADMIN_EMAIL must be set in .env}
      Umbraco__CMS__Unattended__UnattendedUserPassword: ${UMBRACO_ADMIN_PASSWORD:?UMBRACO_ADMIN_PASSWORD must be set in .env}
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
