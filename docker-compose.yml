services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auraevents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auraevents}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-api:
    build:
      context: ./src
      dockerfile: services/Identity.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__IdentityDb: Host=postgres;Port=5432;Database=auraevents_identity;Username=${POSTGRES_USER:-auraevents};Password=${POSTGRES_PASSWORD:?}
      Jwt__Issuer: ${JWT_ISSUER:-https://identity.auraevents.local}
      Jwt__Audience: ${JWT_AUDIENCE:-auraevents-clients}
      Jwt__PublicKeyPath: /keys/jwt-public.pem
      Jwt__PrivateKeyPath: /keys/jwt-private.pem
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
      # The mobile app's web dev target (expo start --web) runs on its own origin — CORS needs it
      # listed explicitly too, separate from the Next.js frontend above.
      Cors__AllowedOrigins__1: ${MOBILE_WEB_ORIGIN:-http://localhost:8081}
      # Shared secret Events.Api presents on its internal bulk-user-lookup calls (organizer
      # attendee list) — must match IdentityApi__SyncKey below.
      UsersSync__SyncKey: ${USERS_SYNC_KEY:?USERS_SYNC_KEY must be set in .env}
    volumes:
      - ./keys:/keys:ro
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy

  events-api:
    build:
      context: ./src
      dockerfile: services/Events.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__EventsDb: Host=postgres;Port=5432;Database=auraevents_events;Username=${POSTGRES_USER:-auraevents};Password=${POSTGRES_PASSWORD:?}
      Jwt__Issuer: ${JWT_ISSUER:-https://identity.auraevents.local}
      Jwt__Audience: ${JWT_AUDIENCE:-auraevents-clients}
      Jwt__PublicKeyPath: /keys/jwt-public.pem
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${MOBILE_WEB_ORIGIN:-http://localhost:8081}
      OpenAI__ApiKey: ${OPENAI_API_KEY:?OPENAI_API_KEY must be set in .env}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4o-mini}
      Umbraco__BaseUrl: http://umbraco:8080
      Umbraco__ClientId: ${UMBRACO_MANAGEMENT_CLIENT_ID:?UMBRACO_MANAGEMENT_CLIENT_ID must be set in .env}
      Umbraco__ClientSecret: ${UMBRACO_MANAGEMENT_CLIENT_SECRET:?UMBRACO_MANAGEMENT_CLIENT_SECRET must be set in .env}
      # Must match EventPageDocumentTypeKey in cms/AuraEvents.Umbraco/Composing/EventContentTypeComposer.cs.
      Umbraco__EventPageDocumentTypeKey: ${UMBRACO_EVENT_PAGE_DOCTYPE_KEY:-d2fa55b7-53fe-49b4-96dc-fdcb95bad0c4}
      # Must match EventsRootFolderKey in cms/AuraEvents.Umbraco/Composing/EventContentTypeComposer.cs
      # — the "Events" folder new eventPage documents get created under.
      Umbraco__EventsRootFolderKey: ${UMBRACO_EVENTS_ROOT_FOLDER_KEY:-8a3c9f2d-1e6b-4d7a-8c5f-2b9e6a1d3f7c}
      # Must match CategoryItemContentTypeKey in cms/AuraEvents.Umbraco/Composing/CategoryContentTypeComposer.cs.
      Umbraco__CategoryItemDocumentTypeKey: ${UMBRACO_CATEGORY_ITEM_DOCTYPE_KEY:-b7f0a9d1-6e2b-4a3c-9e7d-6f5f9d8c1a2b}
      # Must match CategoriesRootFolderKey in cms/AuraEvents.Umbraco/Composing/CategoryContentTypeComposer.cs
      # — same environment-specific gotcha as EventPageDocumentTypeKey (see that comment above):
      # only the default on a fresh database, override via UMBRACO_CATEGORIES_ROOT_FOLDER_KEY if
      # the "Categories" folder was created before this key was fixed.
      Umbraco__CategoriesRootFolderKey: ${UMBRACO_CATEGORIES_ROOT_FOLDER_KEY:-4d8b6e2a-7c1f-4b9d-8e3a-5f2c9d1b6a4e}
      # Shared secret the Umbraco CMS process presents on its category-sync callbacks — must match
      # CategorySync__SyncKey below.
      CategorySync__SyncKey: ${CATEGORY_SYNC_KEY:?CATEGORY_SYNC_KEY must be set in .env}
      # Organizer attendee list resolves UserIds into names/emails via Identity.Api's internal
      # bulk-lookup endpoint — shared secret, not a user JWT (same pattern as CategorySync above).
      IdentityApi__BaseUrl: http://identity-api:8080
      IdentityApi__SyncKey: ${USERS_SYNC_KEY:?USERS_SYNC_KEY must be set in .env}
    volumes:
      - ./keys:/keys:ro
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      umbraco:
        condition: service_started
      identity-api:
        condition: service_started

  umbraco:
    build:
      context: ./cms
      dockerfile: AuraEvents.Umbraco/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__umbracoDbDSN: Host=postgres;Port=5432;Database=auraevents_cms;Username=${POSTGRES_USER:-auraevents};Password=${POSTGRES_PASSWORD:?};Include Error Detail=true
      ConnectionStrings__umbracoDbDSN_ProviderName: Npgsql2
      Umbraco__CMS__Unattended__UnattendedUserName: ${UMBRACO_ADMIN_NAME:-AuraEvents Admin}
      Umbraco__CMS__Unattended__UnattendedUserEmail: ${UMBRACO_ADMIN_EMAIL:?UMBRACO_ADMIN_EMAIL must be set in .env}
      Umbraco__CMS__Unattended__UnattendedUserPassword: ${UMBRACO_ADMIN_PASSWORD:?UMBRACO_ADMIN_PASSWORD must be set in .env}
      # Where CategorySyncNotificationHandler pushes categoryItem publish/delete events.
      EventsApiSync__BaseUrl: http://events-api:8080
      EventsApiSync__SyncKey: ${CATEGORY_SYNC_KEY:?CATEGORY_SYNC_KEY must be set in .env}
    volumes:
      # Without this, every container recreation (including `docker compose up --build` on any
      # other service, since compose re-resolves the whole dependency graph) wipes every uploaded
      # media file — the Umbraco database still has the media item's metadata/URL, so it looks
      # fine until someone actually requests the image and gets a 404.
      - umbraco-media:/app/wwwroot/media
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  umbraco-media:
